<body>
    <script>
        function checkForName(name){
            let pathname = location.pathname; console.log(pathname);
            let hostname = location.hostname; console.log(hostname);
            let hash = location.hash; console.log(hash);

            if(hostname === name)
                return true;
            else if(pathname === "/" + name)
                return true;
            else if(hash === "#" + name)
                return true;
            else
                return false;
        }

        const global = ["shorts/GPn7zvEiEGA", "shorts/upXQQaDTuFM", "watch?v=czfvEpLfCV0", "shorts/kmP1QuVS7M8", "watch?v=KKhnDzRgsW8"];
        const arch = ["watch?v=hbhoAr8GV98", "shorts/dpkt1agd4x0", "shorts/xTQPbhxlsio"].concat(global);
        const microsoft = ["watch?v=2zpCOYkdvTQ", "shorts/fRTzdZcooro", "shorts/OOo0IJlSUc8", "shorts/WpDoFbQMseo"].concat(global);

        function getRandomArrayString(array){
            return array[Math.floor(Math.random() * array.length)]
        }

        let pre = "https://www.youtube.com/";
        let suf = "";

        if(checkForName("arch") === true) {
            window.location.href = pre + getRandomArrayString(arch) + suf;
        }
        else if(checkForName("microsoft") === true) {
            window.location.href = pre + getRandomArrayString(microsoft) + suf;
        }
        else {
            window.location.href = pre + getRandomArrayString(global) + suf;
        }
    </script>
