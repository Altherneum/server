[wpinclude]
backend = systemd
enabled = true
filter = wpinclude
port = http,https
logpath = %(apache_access_log)s
maxretry = 1
findtime = 96h
bantime = 96h
mode = aggressive
destemail = root@altherneum.fr
sender = fail2ban.wpinclude@altherneum.fr
sendername = Fail2ban
mta = sendmail
action = %(action_mwl)s
bantime.increment = true
bantime.factor = 1
bantime.maxtime = 360d