<VirtualHost *:80>
    ServerName altherneum.fr
    ServerAlias www.altherneum.fr

    Redirect 301 / https://altherneum.fr/
</VirtualHost>

<VirtualHost *:80>
    ServerName github.altherneum.fr

    Redirect 301 / https://github.com/altherneum/
</VirtualHost>

<VirtualHost *:80>
    ServerName git.altherneum.fr
    ServerAlias repo.altherneum.fr forgejo.altherneum.fr

    <Location /.well-known/acme-challenge>
        ProxyPass "http://127.0.0.1:8443/.well-known/acme-challenge"
        ProxyPassReverse "http://127.0.0.1:8443/.well-known/acme-challenge"
    </Location>

    Redirect 301 / https://git.altherneum.fr/
</VirtualHost>

<VirtualHost *:80>
    ServerName windows.altherneum.fr
    ServerAlias microsoft.altherneum.fr

    Redirect 301 / https://windows.altherneum.fr
</VirtualHost>

<VirtualHost *:80>
    ServerName arch.altherneum.fr
    ServerAlias linux.altherneum.fr
    
    Redirect 301 / https://arch.altherneum.fr/
</VirtualHost>

<VirtualHost *:80>
    ServerName archterneum.altherneum.fr
    ServerAlias myarch.altherneum.fr git.arch.altherneum.fr
    Redirect 301 / https://archterneum.altherneum.fr
</VirtualHost>

<VirtualHost *:80>
    ServerName code.altherneum.fr
    ServerAlias vscode.altherneum.fr 3000.code.altherneum.fr

    <Location /.well-known/acme-challenge>
        ProxyPass "http://127.0.0.1:8443/.well-known/acme-challenge"
        ProxyPassReverse "http://127.0.0.1:8443/.well-known/acme-challenge"
    </Location>

    Redirect 301 / https://code.altherneum.fr
</VirtualHost>

<VirtualHost *:80>
    ServerName keeweb.altherneum.fr
    ServerAlias keepass.altherneum.fr keys.altherneum.fr key.altherneum.fr
    Redirect 301 / https://keeweb.altherneum.fr
</VirtualHost>

<VirtualHost *:80>
    ServerName minecraft.altherneum.fr
    ServerAlias play.altherneum.fr mc.altherneum.fr
    ServerAdmin root@altherneum.fr

    <Location /.well-known/acme-challenge>
        ProxyPass "http://127.0.0.1:8443/.well-known/acme-challenge"
        ProxyPassReverse "http://127.0.0.1:8443/.well-known/acme-challenge"
    </Location>

    Redirect 301 / https://minecraft.altherneum.fr
</VirtualHost>

<VirtualHost *:80>
    ServerName ask.altherneum.fr
    ServerAlias ai.altherneum.fr ia.altherneum.fr
    ServerAdmin root@altherneum.fr

    Redirect 301 / https://ask.altherneum.fr
</VirtualHost>

<VirtualHost *:80>
    ServerName search.altherneum.fr
    ServerAlias lost.altherneum.fr *.altherneum.fr
    ServerAdmin root@altherneum.fr

    Redirect 301 / https://search.altherneum.fr
</VirtualHost>
